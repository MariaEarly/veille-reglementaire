<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veille Réglementaire</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --surface: #fffaf0;
      --card: #ffffff;
      --border: #d6c7ad;
      --text: #1f1a14;
      --text-muted: #6f6558;
      --accent: #9f3d24;
      --accent-dark: #7d2f1b;
      --accent-2: #1e5b52;
      --accent-2-light: #2d8176;
      --warn: #a36a00;
      --success: #2d8176;
      --shadow-sm: 0 2px 8px rgba(31, 26, 20, 0.08);
      --shadow-md: 0 4px 16px rgba(31, 26, 20, 0.12);
      --shadow-lg: 0 12px 32px rgba(31, 26, 20, 0.15);
      --radius: 12px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Georgia, serif;
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(159, 61, 36, 0.08), transparent 24rem),
                  radial-gradient(circle at bottom right, rgba(30, 91, 82, 0.08), transparent 24rem),
                  var(--bg);
      line-height: 1.5;
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
      transition: color 150ms ease;
    }

    a:hover {
      color: var(--accent-2-light);
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 250, 240, 0.95));
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .header-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .header-title h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-title .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(159, 61, 36, 0.1);
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
    }

    .header-stats {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* Main container */
    .main {
      flex: 1;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
    }

    .tab-button {
      padding: 12px 18px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 200ms ease;
      position: relative;
      margin-bottom: -2px;
    }

    .tab-button:hover {
      color: var(--text);
    }

    .tab-button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 150ms ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Feed tab */
    .feed-header {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: 0.95rem;
      background: var(--card);
      color: var(--text);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(159, 61, 36, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .filter-select, .sort-select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .filter-select:focus, .sort-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(159, 61, 36, 0.1);
    }

    /* Cards */
    .cards-grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      transition: all 200ms ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-title {
      flex: 1;
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .card-title a {
      color: var(--accent);
    }

    .card-title a:hover {
      text-decoration: underline;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 40px;
      background: linear-gradient(135deg, rgba(159, 61, 36, 0.15), rgba(159, 61, 36, 0.05));
      border: 1px solid rgba(159, 61, 36, 0.3);
      border-radius: 50%;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--accent);
      flex-shrink: 0;
    }

    .card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.85rem;
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(30, 91, 82, 0.1);
      color: var(--accent-2);
      border-radius: 999px;
      font-weight: 600;
    }

    .category-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: rgba(159, 61, 36, 0.08);
      color: var(--accent);
      border-radius: 999px;
      font-weight: 500;
      font-size: 0.8rem;
    }

    .date-text {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .card-summary {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin: 0;
    }

    .card-summary.full {
      font-size: 0.95rem;
      color: var(--text);
    }

    .card-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 8px;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 150ms ease;
    }

    .icon-btn:hover {
      background: var(--card);
      border-color: var(--accent);
      color: var(--accent);
    }

    .icon-btn.active {
      background: rgba(159, 61, 36, 0.1);
      color: var(--accent);
      border-color: var(--accent);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--surface);
      transition: all 150ms ease;
    }

    .status-pill:hover {
      background: var(--border);
    }

    .status-pill.new {
      background: rgba(30, 91, 82, 0.1);
      color: var(--accent-2);
      border-color: var(--accent-2);
    }

    .status-pill.important {
      background: rgba(159, 61, 36, 0.1);
      color: var(--accent);
      border-color: var(--accent);
    }

    .status-pill.reviewed {
      background: rgba(106, 101, 92, 0.1);
      color: var(--text-muted);
      border-color: var(--text-muted);
    }

    .status-pill.archived {
      background: rgba(106, 101, 92, 0.05);
      color: var(--text-muted);
      border-color: var(--border);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state-text {
      font-size: 1rem;
    }

    /* Sources panel */
    .sources-grid {
      display: grid;
      gap: 16px;
    }

    .source-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .source-info {
      flex: 1;
    }

    .source-name {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .source-details {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 4px 0 0;
    }

    .source-actions {
      display: flex;
      gap: 8px;
    }

    /* Digest view */
    .digest-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .period-btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      transition: all 150ms ease;
    }

    .period-btn:hover {
      border-color: var(--accent);
    }

    .period-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Buttons */
    button {
      font: inherit;
      border: none;
      border-radius: var(--radius);
      padding: 10px 16px;
      cursor: pointer;
      transition: all 150ms ease;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-dark);
      box-shadow: var(--shadow-sm);
    }

    .btn-secondary {
      background: var(--accent-2);
      color: #fff;
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--accent-2-light);
      box-shadow: var(--shadow-sm);
    }

    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) {
      background: var(--border);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Toast notifications */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      max-width: 400px;
      padding: 14px 18px;
      background: var(--card);
      border-left: 4px solid var(--success);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      animation: slideIn 200ms ease;
      z-index: 1000;
    }

    .toast.error {
      border-left-color: #c94444;
    }

    .toast.success {
      border-left-color: var(--success);
    }

    .toast.info {
      border-left-color: var(--accent);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }

    .toast.removing {
      animation: slideOut 200ms ease;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(159, 61, 36, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        gap: 16px;
      }

      .header-stats {
        width: 100%;
        justify-content: space-around;
      }

      .main {
        padding: 16px;
      }

      .tabs {
        margin-bottom: 16px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .filters {
        flex-direction: column;
      }

      .filter-group {
        width: 100%;
      }

      .filter-select, .sort-select {
        width: 100%;
      }

      .card {
        padding: 14px;
      }

      .source-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .source-actions {
        width: 100%;
        flex-direction: column;
      }

      .source-actions button {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .header-title h1 {
        font-size: 1.3rem;
      }

      .card-header {
        flex-direction: column;
      }

      .score-badge {
        align-self: flex-start;
      }

      .toast {
        right: 12px;
        left: 12px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-content">
        <div class="header-title">
          <h1>📋 Veille Réglementaire</h1>
          <span class="badge">Monitoring en temps réel</span>
        </div>
        <div class="header-stats">
          <div class="stat-item">
            <span class="stat-number" id="header-items-count">0</span>
            <span class="stat-label">Items</span>
          </div>
          <div class="stat-item">
            <span class="stat-number" id="header-sources-count">0</span>
            <span class="stat-label">Sources</span>
          </div>
          <div class="stat-item">
            <span class="stat-number" id="header-brief-count">0</span>
            <span class="stat-label">Early Brief</span>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="tabs">
        <button class="tab-button active" data-tab="feed">📰 Fil d'actualité</button>
        <button class="tab-button" data-tab="brief">⭐ Early Brief</button>
        <button class="tab-button" data-tab="sources">📡 Sources</button>
        <button class="tab-button" data-tab="digest">📊 Digest</button>
      </div>

      <!-- Feed Tab -->
      <div id="feed" class="tab-content active">
        <div class="feed-header">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input id="search-input" type="text" placeholder="Rechercher dans les items..." />
          </div>
          <div class="filters">
            <div class="filter-group">
              <label class="filter-label">Catégorie</label>
              <select id="category-filter" class="filter-select">
                <option value="">Toutes les catégories</option>
              </select>
            </div>
            <div class="filter-group">
              <label class="filter-label">Statut</label>
              <select id="status-filter" class="filter-select">
                <option value="">Tous les statuts</option>
                <option value="new">Nouveau</option>
                <option value="important">Important</option>
                <option value="reviewed">Examiné</option>
                <option value="archived">Archivé</option>
              </select>
            </div>
            <div class="filter-group">
              <label class="filter-label">Score min</label>
              <input id="score-filter" type="number" min="0" max="100" value="" placeholder="0-100" style="width: 80px; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card);" />
            </div>
            <div class="filter-group">
              <label class="filter-label">Tri</label>
              <select id="sort-select" class="sort-select">
                <option value="score-desc">Score (↓)</option>
                <option value="date-desc">Date récente (↓)</option>
                <option value="date-asc">Date ancienne (↑)</option>
              </select>
            </div>
          </div>
        </div>
        <div class="cards-grid" id="feed-list">
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-text">Aucun item à afficher</div>
          </div>
        </div>
      </div>

      <!-- Early Brief Tab -->
      <div id="brief" class="tab-content">
        <div class="cards-grid" id="brief-list">
          <div class="empty-state">
            <div class="empty-state-icon">⭐</div>
            <div class="empty-state-text">Aucun item marqué pour le brief matinal</div>
          </div>
        </div>
      </div>

      <!-- Sources Tab -->
      <div id="sources" class="tab-content">
        <div style="margin-bottom: 24px;">
          <div class="btn-group">
            <button id="seed-sources-btn" class="btn-secondary">🌱 Seed sources</button>
            <button id="refresh-all-btn" class="btn-primary">🔄 Refresh all</button>
          </div>
        </div>
        <div class="sources-grid" id="sources-list">
          <div class="empty-state">
            <div class="empty-state-icon">📡</div>
            <div class="empty-state-text">Aucune source configurée</div>
          </div>
        </div>
      </div>

      <!-- Digest Tab -->
      <div id="digest" class="tab-content">
        <div class="digest-selector">
          <button class="period-btn active" data-period="3">3 jours</button>
          <button class="period-btn" data-period="7">7 jours</button>
          <button class="period-btn" data-period="14">14 jours</button>
          <button class="period-btn" data-period="30">30 jours</button>
        </div>
        <div class="cards-grid" id="digest-list">
          <div class="empty-state">
            <div class="empty-state-icon">📊</div>
            <div class="empty-state-text">Aucun item dans ce digest</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const state = {
      items: [],
      briefItems: [],
      sources: [],
      digest: null,
      allCategories: new Set(),
      currentTab: 'feed',
      currentPeriod: '3',
      searchDebounce: null,
      filterDebounce: null,
    };

    // Utility functions
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('removing');
        setTimeout(() => toast.remove(), 200);
      }, 3000);
    }

    async function api(path, options = {}) {
      try {
        const response = await fetch(path, {
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {}),
          },
          ...options,
        });

        if (!response.ok) {
          let detail = response.statusText;
          try {
            const data = await response.json();
            detail = data.detail || JSON.stringify(data);
          } catch (_) {
            detail = await response.text();
          }
          throw new Error(detail);
        }

        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
          return response.json();
        }
        return response.text();
      } catch (error) {
        showToast(`Erreur: ${error.message}`, 'error');
        throw error;
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'n/a';
      const date = new Date(dateStr);
      if (isNaN(date.getTime())) return dateStr;
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 60) return `${diffMins}m`;
      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours}h`;
      const diffDays = Math.floor(diffHours / 24);
      if (diffDays < 7) return `${diffDays}j`;
      return date.toLocaleDateString('fr-FR');
    }

    function truncateSummary(text, maxLength = 150) {
      if (!text) return '';
      if (text.length <= maxLength) return text;
      return text.substring(0, maxLength) + '...';
    }

    // Tab switching
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => {
        const tab = button.getAttribute('data-tab');
        switchTab(tab);
      });
    });

    function switchTab(tabName) {
      state.currentTab = tabName;
      document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      document.getElementById(tabName).classList.add('active');

      if (tabName === 'brief') {
        renderBriefTab();
      } else if (tabName === 'digest') {
        renderDigestTab();
      }
    }

    // Render functions
    function renderItemCard(item, options = {}) {
      const { isEarlyBrief = false, showFull = false } = options;
      const titleLink = item.url
        ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">${escapeHtml(item.title)}</a>`
        : escapeHtml(item.title);

      const summary = showFull ? (item.summary || '') : truncateSummary(item.summary);

      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">${titleLink}</h3>
            <div class="score-badge">${Math.round(item.score)}</div>
          </div>
          <div class="card-meta">
            <span class="source-pill">${escapeHtml(item.source_name)}</span>
            ${item.category ? `<span class="category-pill">${escapeHtml(item.category)}</span>` : ''}
            <span class="date-text">${formatDate(item.published_at)}</span>
          </div>
          ${summary ? `<p class="card-summary ${showFull ? 'full' : ''}">${escapeHtml(summary)}</p>` : ''}
          <div class="card-actions">
            <button class="icon-btn ${item.early_brief ? 'active' : ''}" title="Ajouter au brief" onclick="toggleEarlyBrief('${item.id}', this)">⭐</button>
            <button class="status-pill ${item.status || 'new'}" onclick="cycleStatus('${item.id}', this)">${escapeHtml(item.status || 'new')}</button>
          </div>
        </div>
      `;
    }

    function renderFeedTab() {
      const container = document.getElementById('feed-list');
      const search = document.getElementById('search-input').value.toLowerCase();
      const category = document.getElementById('category-filter').value;
      const status = document.getElementById('status-filter').value;
      const scoreMin = parseFloat(document.getElementById('score-filter').value) || 0;
      const sort = document.getElementById('sort-select').value;

      let filtered = state.items.filter(item => {
        if (search && !item.title.toLowerCase().includes(search) &&
            !item.summary.toLowerCase().includes(search)) return false;
        if (category && item.category !== category) return false;
        if (status && item.status !== status) return false;
        if (item.score < scoreMin) return false;
        return true;
      });

      if (sort === 'score-desc') {
        filtered.sort((a, b) => b.score - a.score);
      } else if (sort === 'date-desc') {
        filtered.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
      } else if (sort === 'date-asc') {
        filtered.sort((a, b) => new Date(a.published_at) - new Date(b.published_at));
      }

      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-text">Aucun item ne correspond à vos critères</div>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(item => renderItemCard(item)).join('');
    }

    function renderBriefTab() {
      const container = document.getElementById('brief-list');
      const briefItems = state.items.filter(item => item.early_brief);

      if (!briefItems.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⭐</div>
            <div class="empty-state-text">Aucun item marqué pour le brief matinal</div>
          </div>
        `;
        return;
      }

      briefItems.sort((a, b) => b.score - a.score);
      container.innerHTML = briefItems.map(item => renderItemCard(item, { isEarlyBrief: true, showFull: true })).join('');
      updateStats();
    }

    function renderSourcesTab() {
      const container = document.getElementById('sources-list');
      if (!state.sources.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📡</div>
            <div class="empty-state-text">Aucune source configurée</div>
          </div>
        `;
        return;
      }

      container.innerHTML = state.sources.map(source => `
        <div class="source-card">
          <div class="source-info">
            <h3 class="source-name">${escapeHtml(source.name)}</h3>
            <div class="source-details">
              ${escapeHtml(source.source_type)} ${source.url ? '• ' + escapeHtml(source.url) : ''}
            </div>
          </div>
          <div class="source-actions">
            ${source.source_type === 'rss'
              ? `<button class="btn-secondary" onclick="ingestSource('${source.id}', this)">Ingest</button>`
              : '<span style="color: var(--text-muted); font-size: 0.85rem;">Non RSS</span>'
            }
          </div>
        </div>
      `).join('');
    }

    function renderDigestTab() {
      const container = document.getElementById('digest-list');
      if (!state.digest || !state.digest.top_items.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📊</div>
            <div class="empty-state-text">Aucun item dans ce digest</div>
          </div>
        `;
        return;
      }

      container.innerHTML = state.digest.top_items.map(item => renderItemCard(item, { showFull: true })).join('');
    }

    function updateStats() {
      const itemsCount = state.items.length;
      const sourcesCount = state.sources.length;
      const briefCount = state.items.filter(i => i.early_brief).length;

      document.getElementById('header-items-count').textContent = itemsCount;
      document.getElementById('header-sources-count').textContent = sourcesCount;
      document.getElementById('header-brief-count').textContent = briefCount;
    }

    function updateCategoryFilter() {
      const select = document.getElementById('category-filter');
      const currentValue = select.value;
      select.innerHTML = '<option value="">Toutes les catégories</option>';
      Array.from(state.allCategories).sort().forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat || 'Sans catégorie';
        select.appendChild(option);
      });
      select.value = currentValue;
    }

    // Data loading
    async function loadItems() {
      try {
        const items = await api('/items');
        state.items = items;
        items.forEach(item => {
          if (item.category) state.allCategories.add(item.category);
        });
        updateCategoryFilter();
        if (state.currentTab === 'feed') {
          renderFeedTab();
        }
        updateStats();
      } catch (error) {
        console.error('Error loading items:', error);
      }
    }

    async function loadSources() {
      try {
        const sources = await api('/sources');
        state.sources = sources;
        if (state.currentTab === 'sources') {
          renderSourcesTab();
        }
        updateStats();
      } catch (error) {
        console.error('Error loading sources:', error);
      }
    }

    async function loadDigest() {
      try {
        const digest = await api(`/digest?days=${state.currentPeriod}`);
        state.digest = digest;
        if (state.currentTab === 'digest') {
          renderDigestTab();
        }
      } catch (error) {
        console.error('Error loading digest:', error);
      }
    }

    async function loadAll() {
      await Promise.all([loadItems(), loadSources(), loadDigest()]);
    }

    // Interactions
    async function toggleEarlyBrief(itemId, button) {
      const item = state.items.find(i => i.id === itemId);
      if (!item) return;

      const newValue = !item.early_brief;
      try {
        await api(`/items/${itemId}`, {
          method: 'PATCH',
          body: JSON.stringify({ early_brief: newValue }),
        });
        item.early_brief = newValue;
        button.classList.toggle('active');
        updateStats();
        showToast(newValue ? 'Ajouté au brief' : 'Retiré du brief', 'success');
      } catch (error) {
        showToast('Erreur lors de la mise à jour', 'error');
      }
    }

    const statuses = ['new', 'important', 'reviewed', 'archived'];
    async function cycleStatus(itemId, button) {
      const item = state.items.find(i => i.id === itemId);
      if (!item) return;

      const currentIndex = statuses.indexOf(item.status || 'new');
      const nextStatus = statuses[(currentIndex + 1) % statuses.length];

      try {
        await api(`/items/${itemId}`, {
          method: 'PATCH',
          body: JSON.stringify({ status: nextStatus }),
        });
        item.status = nextStatus;
        button.className = `status-pill ${nextStatus}`;
        button.textContent = nextStatus;
        showToast(`Statut changé à "${nextStatus}"`, 'success');
      } catch (error) {
        showToast('Erreur lors de la mise à jour', 'error');
      }
    }

    async function ingestSource(sourceId, button) {
      button.disabled = true;
      const original = button.textContent;
      button.innerHTML = '<span class="spinner"></span>';

      try {
        const result = await api(`/ingest/rss/${sourceId}`, { method: 'POST' });
        showToast(`${result.created} items créés sur ${result.parsed} lus`, 'success');
        await loadAll();
      } catch (error) {
        showToast('Erreur lors de l'ingestion', 'error');
      } finally {
        button.disabled = false;
        button.textContent = original;
      }
    }

    // Seed sources
    document.getElementById('seed-sources-btn').addEventListener('click', async function() {
      this.disabled = true;
      const original = this.textContent;
      this.innerHTML = '<span class="spinner"></span>';

      try {
        await api('/sources/seed', { method: 'POST' });
        showToast('Sources seeding réussies', 'success');
        await loadAll();
      } catch (error) {
        showToast('Erreur lors du seeding', 'error');
      } finally {
        this.disabled = false;
        this.textContent = original;
      }
    });

    // Refresh all
    document.getElementById('refresh-all-btn').addEventListener('click', async function() {
      this.disabled = true;
      const original = this.textContent;
      this.innerHTML = '<span class="spinner"></span>';

      try {
        const result = await api('/ingest/all', { method: 'POST' });
        showToast(`${result.total_created} items créés au total`, 'success');
        await loadAll();
      } catch (error) {
        showToast('Erreur lors du rafraîchissement', 'error');
      } finally {
        this.disabled = false;
        this.textContent = original;
      }
    });

    // Search with debounce
    document.getElementById('search-input').addEventListener('input', function() {
      clearTimeout(state.searchDebounce);
      state.searchDebounce = setTimeout(() => {
        renderFeedTab();
      }, 300);
    });

    // Filters with debounce
    [
      document.getElementById('category-filter'),
      document.getElementById('status-filter'),
      document.getElementById('score-filter'),
      document.getElementById('sort-select'),
    ].forEach(el => {
      el.addEventListener('change', function() {
        clearTimeout(state.filterDebounce);
        state.filterDebounce = setTimeout(() => {
          renderFeedTab();
        }, 300);
      });
    });

    // Digest period buttons
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', async function() {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        state.currentPeriod = this.getAttribute('data-period');
        await loadDigest();
        renderDigestTab();
      });
    });

    // Initialize
    loadAll();
    window.toggleEarlyBrief = toggleEarlyBrief;
    window.cycleStatus = cycleStatus;
    window.ingestSource = ingestSource;
  </script>
</body>
</html>
