<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Early Brief — Veille Réglementaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --terra: #9E3D1B;
      --terra-bg: #9E3D1B14;
      --rose: #C48B9F;
      --rose-bg: #FAF0F4;
      --ecru: #F5F2EB;
      --color-background-primary: #FFFFFF;
      --color-background-secondary: #F7F7F5;
      --color-background-tertiary: #EFEFEC;
      --color-text-primary: #1A1814;
      --color-text-secondary: #6B6660;
      --color-text-tertiary: #9B9590;
      --color-border-tertiary: #E8E5E0;
      --color-border-secondary: #D5D0CA;
      --radius: 8px;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      color: var(--color-text-primary);
      background: var(--color-background-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
    }
    a { color: var(--color-text-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Layout wrapper */
    .layout-wrapper {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      padding: 24px 24px 20px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
    }
    .header h1 {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }
    .header h1 span { color: var(--terra); }
    .header .subtitle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    /* Main content area */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      border-right: 0.5px solid var(--color-border-tertiary);
      overflow-y: auto;
      padding: 16px 12px;
      background: var(--color-background-primary);
    }

    .sidebar-section {
      margin-bottom: 24px;
    }

    .sidebar-section-label {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: var(--color-text-primary);
      transition: all 120ms;
      margin-bottom: 4px;
    }

    .sidebar-item:hover {
      background: var(--color-background-secondary);
    }

    .sidebar-item.active {
      background: var(--terra-bg);
      color: var(--terra);
      font-weight: 500;
    }

    .sidebar-item-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-border-secondary);
      flex-shrink: 0;
    }

    .sidebar-item.active .sidebar-item-dot {
      background: var(--terra);
    }

    .sidebar-item-label {
      flex: 1;
    }

    .sidebar-item-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--color-text-tertiary);
      margin-left: auto;
      flex-shrink: 0;
    }

    .sidebar-section-divider {
      border-bottom: 0.5px solid var(--color-border-tertiary);
      margin-bottom: 16px;
    }

    .sidebar-section {
      margin-bottom: 16px;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-tertiary);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .sidebar-section .source-groups {
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .sidebar-section .source-groups::-webkit-scrollbar {
      width: 3px;
    }
    .sidebar-section .source-groups::-webkit-scrollbar-thumb {
      background: var(--color-border-tertiary);
      border-radius: 3px;
    }

    /* Advanced filters toggle */
    .sidebar-toggle {
      cursor: pointer;
      font-size: 12px;
      color: var(--color-text-secondary);
      padding: 8px 10px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 120ms;
      font-weight: 500;
    }

    .sidebar-toggle:hover {
      background: var(--color-background-secondary);
    }

    .advanced-filters {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 0.5px solid var(--color-border-tertiary);
    }

    .advanced-filters.open {
      display: block;
    }

    .filter-group {
      margin-bottom: 12px;
    }

    .filter-group-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .filter-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .filter-pill {
      padding: 4px 8px;
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 120ms;
      font-family: var(--sans);
      font-weight: 500;
    }

    .filter-pill:hover {
      background: var(--color-background-tertiary);
    }

    .filter-pill.active {
      background: var(--terra-bg);
      color: var(--terra);
    }

    .source-groups {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .source-group-label {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
      padding-left: 2px;
    }

    .source-group-items {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .source-pill {
      padding: 3px 8px;
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 120ms;
      font-family: var(--sans);
      font-weight: 400;
    }

    .source-pill:hover {
      background: var(--color-background-tertiary);
    }

    .source-pill.active {
      background: var(--terra-bg);
      color: var(--terra);
      font-weight: 500;
    }

    .source-pill .source-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--color-text-tertiary);
      margin-left: 3px;
    }

    .source-pill.active .source-count {
      color: var(--terra);
      opacity: 0.7;
    }

    .date-range-group {
      display: flex;
      gap: 4px;
      font-size: 11px;
    }

    .date-range-group input {
      flex: 1;
      padding: 4px 6px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      background: var(--color-background-secondary);
    }

    /* Center column */
    .center-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--color-background-secondary);
      overflow: hidden;
    }

    /* Topbar */
    .topbar {
      height: 48px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--color-background-primary);
    }

    .topbar-stats {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .stat-value {
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .topbar-controls {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .sort-button {
      padding: 6px 12px;
      background: transparent;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 4px;
      font-size: 12px;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all 120ms;
      font-family: var(--sans);
      font-weight: 500;
    }

    .sort-button:hover {
      border-color: var(--color-border-secondary);
    }

    .sort-button.active {
      background: var(--color-background-secondary);
      border-color: var(--color-border-secondary);
      color: var(--color-text-primary);
    }

    .search-input {
      padding: 6px 10px;
      border: none;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      background: transparent;
      font-family: var(--sans);
      font-size: 12px;
      color: var(--color-text-primary);
      flex: 0 0 200px;
      transition: all 120ms;
    }

    .search-input::placeholder {
      color: var(--color-text-tertiary);
    }

    .search-input:focus {
      outline: none;
      border-bottom-color: var(--color-text-secondary);
    }

    /* Feed cards */
    .feed-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cards { display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      transition: all 120ms ease;
    }

    .card:hover {
      border-color: var(--color-border-secondary);
      background: var(--color-background-primary);
    }

    .card.important {
      border-left: 2px solid var(--terra);
      padding-left: 13px;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--color-text-tertiary);
    }

    .meta-sep { color: var(--color-text-tertiary); }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 0;
      font-size: 11px;
      font-weight: 400;
      color: var(--color-text-tertiary);
    }

    .score-badge {
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      font-family: var(--mono);
    }

    .score-badge.high {
      background: var(--terra-bg);
      color: var(--terra);
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
      line-height: 1.4;
    }

    .card-title a {
      color: var(--color-text-primary);
    }

    .card-title a:hover {
      color: var(--terra);
      text-decoration: none;
    }

    .card-summary {
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      background: var(--color-background-secondary);
      color: var(--color-text-tertiary);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 400;
    }

    .chip.new {
      background: #EAF3DE;
      color: #3B6D11;
    }

    .chip.important {
      background: var(--terra-bg);
      color: var(--terra);
    }

    .chip.reviewed {
      background: var(--color-background-secondary);
      color: var(--color-text-tertiary);
    }

    .chip.draft {
      background: var(--rose-bg);
      color: var(--rose);
    }

    .chip.action-required {
      background: var(--rose-bg);
      color: var(--rose);
    }

    .chip.social-signal {
      background: #E8E5F0;
      color: #6B5B95;
    }

    .card.social-source {
      border-left: 2px dashed #6B5B95;
      padding-left: 13px;
      opacity: 0.85;
    }

    .card.social-source:hover {
      opacity: 1;
    }

    .early-brief-marker {
      margin-left: auto;
      font-size: 11px;
      color: var(--rose);
      font-weight: 500;
    }

    /* Detail panel */
    .card-detail {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 0.5px solid var(--color-border-tertiary);
    }

    .card.expanded .card-detail {
      display: block;
    }

    .card.expanded .card-summary {
      -webkit-line-clamp: unset;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .detail-field label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      font-family: var(--mono);
      font-weight: 600;
      margin-bottom: 2px;
      letter-spacing: 0.04em;
    }

    .detail-field span {
      font-size: 12px;
      color: var(--color-text-primary);
    }

    .note-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    .note-input {
      flex: 1;
      padding: 6px 0;
      border: none;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      font-family: var(--sans);
      font-size: 12px;
      color: var(--color-text-primary);
      background: transparent;
      transition: all 120ms;
    }

    .note-input::placeholder {
      color: var(--color-text-tertiary);
    }

    .note-input:focus {
      outline: none;
      border-bottom-color: var(--color-text-secondary);
    }

    .detail-btn {
      padding: 4px 0;
      font-size: 12px;
      font-family: var(--sans);
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all 120ms;
      font-weight: 500;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .detail-btn:hover {
      color: var(--color-text-primary);
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    /* Right panel */
    .right-panel {
      width: 240px;
      border-left: 0.5px solid var(--color-border-tertiary);
      overflow-y: auto;
      padding: 16px 12px;
      background: var(--color-background-primary);
    }

    .right-panel-header {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }

    .right-panel-subheader {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-bottom: 12px;
      font-family: var(--mono);
    }

    .draft-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .draft-item {
      background: var(--color-background-secondary);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .draft-item-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-primary);
      line-height: 1.4;
      margin-bottom: 3px;
    }

    .draft-item-source {
      font-size: 11px;
      color: var(--color-text-secondary);
      font-family: var(--mono);
    }

    .export-btn {
      background: var(--terra);
      color: var(--ecru);
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      padding: 8px;
      width: 100%;
      cursor: pointer;
      font-family: var(--sans);
      transition: all 120ms;
    }

    .export-btn:hover {
      background: #8B3416;
    }

    /* Empty state */
    .empty, .loading {
      text-align: center;
      padding: 32px 16px;
      color: var(--color-text-secondary);
      font-size: 13px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 200;
      background: var(--color-text-primary);
      color: var(--color-background-primary);
      padding: 10px 16px;
      font-size: 12px;
      border-radius: 6px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 200ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .sidebar { width: 180px; }
      .right-panel { width: 200px; }
    }

    @media (max-width: 768px) {
      .main-content { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 0.5px solid var(--color-border-tertiary); max-height: 120px; overflow-x: auto; }
      .right-panel { width: 100%; border-left: none; border-top: 0.5px solid var(--color-border-tertiary); max-height: 120px; }
      .center-column { flex: 1; }
    }
  </style>
</head>
<body>

<div class="layout-wrapper">
  <header class="header">
    <h1>Early <span>Brief</span></h1>
    <div class="subtitle" id="last-update">Chargement...</div>
  </header>

  <div class="main-content">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Fil</div>
        <div class="sidebar-item active" data-filter="fil" data-value="">
          <div class="sidebar-item-dot"></div>
          <div class="sidebar-item-label">Tous</div>
          <div class="sidebar-item-count" id="count-tous">0</div>
        </div>
        <div class="sidebar-item" data-filter="fil" data-value="fresh">
          <div class="sidebar-item-dot" style="background: #3B6D11;"></div>
          <div class="sidebar-item-label">&lt; 24h</div>
          <div class="sidebar-item-count" id="count-fresh">0</div>
        </div>
        <div class="sidebar-item" data-filter="fil" data-value="primary">
          <div class="sidebar-item-dot" style="background: var(--terra);"></div>
          <div class="sidebar-item-label">Source primaire</div>
          <div class="sidebar-item-count" id="count-primary">0</div>
        </div>
        <div class="sidebar-section-divider"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">Statut</div>
        <div class="sidebar-item" data-filter="status" data-value="new">
          <div class="sidebar-item-dot"></div>
          <div class="sidebar-item-label">Nouveau</div>
          <div class="sidebar-item-count" id="count-status-new">0</div>
        </div>
        <div class="sidebar-item" data-filter="status" data-value="important">
          <div class="sidebar-item-dot"></div>
          <div class="sidebar-item-label">Important</div>
          <div class="sidebar-item-count" id="count-status-important">0</div>
        </div>
        <div class="sidebar-item" data-filter="status" data-value="reviewed">
          <div class="sidebar-item-dot"></div>
          <div class="sidebar-item-label">Relu</div>
          <div class="sidebar-item-count" id="count-status-reviewed">0</div>
        </div>
        <div class="sidebar-item" data-filter="status" data-value="draft">
          <div class="sidebar-item-dot"></div>
          <div class="sidebar-item-label">À publier</div>
          <div class="sidebar-item-count" id="count-status-draft">0</div>
        </div>
        <div class="sidebar-item" data-filter="status" data-value="archived">
          <div class="sidebar-item-dot"></div>
          <div class="sidebar-item-label">Archivé</div>
          <div class="sidebar-item-count" id="count-status-archived">0</div>
        </div>
        <div class="sidebar-section-divider"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">SOURCE</div>
        <div id="sources-list" class="source-groups"></div>
      </div>

      <div class="sidebar-toggle" onclick="toggleAdvancedFilters()">
        <span>Filtres avancés</span>
        <span id="toggle-arrow">▾</span>
      </div>

      <div class="advanced-filters" id="advanced-filters">
        <div class="filter-group">
          <div class="filter-group-label">Score min</div>
          <div class="filter-pills" id="score-pills"></div>
        </div>
        <div class="filter-group">
          <div class="filter-group-label">Type</div>
          <div class="filter-pills" id="doctype-pills"></div>
        </div>
        <div class="filter-group">
          <div class="filter-group-label">Action</div>
          <div class="filter-pills" id="action-pills"></div>
        </div>
        <div class="filter-group">
          <div class="filter-group-label">Plage de date</div>
          <div class="date-range-group">
            <input type="date" id="filter-date-from" placeholder="De" />
            <input type="date" id="filter-date-to" placeholder="À" />
          </div>
        </div>
      </div>
    </aside>

    <div class="center-column">
      <div class="topbar">
        <div class="topbar-stats">
          <span><span class="stat-value" id="stat-total">0</span> articles</span>
          <span><span class="stat-value" id="stat-fresh">0</span> &lt;24h</span>
          <span><span class="stat-value" id="stat-important">0</span> à publier</span>
        </div>
        <div class="topbar-controls">
          <input type="text" id="search" class="search-input" placeholder="Rechercher..." />
          <button class="sort-button active" data-sort="fresh">Récents</button>
          <button class="sort-button" data-sort="score">Score</button>
          <button class="sort-button" data-sort="date">Date</button>
        </div>
      </div>

      <div class="feed-container">
        <div class="cards" id="feed-cards">
          <div class="loading">Chargement des articles...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://zmxrcafyoepcjyrbpzam.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpteHJjYWZ5b2VwY2p5cmJwemFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjA3ODIsImV4cCI6MjA5MDA5Njc4Mn0.e1o3O4m57RHIA8rtZw3ODutEJccOL72oP5uJzyhiCZg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const state = { items: [], sources: [], activeTab: 'feed', filFilter: '', statusFilter: '', sourceFilter: '' };

// --- Supabase-backed state (with localStorage fallback) ---
async function loadLocalState() {
  try {
    const { data, error } = await sb.from('article_state').select('*');
    if (error) throw error;
    const result = {};
    (data || []).forEach(row => {
      result[row.hash] = { status: row.status, early_brief: row.early_brief, note: row.note || '' };
    });
    try { localStorage.setItem('veille_local', JSON.stringify(result)); } catch(e) {}
    return result;
  } catch(e) {
    console.warn('Supabase read failed, falling back to localStorage:', e.message);
    try { return JSON.parse(localStorage.getItem('veille_local') || '{}'); } catch(e2) { return {}; }
  }
}

async function saveItemState(hash, status, early_brief, note) {
  try {
    const local = JSON.parse(localStorage.getItem('veille_local') || '{}');
    local[hash] = { status, early_brief, note: note || '' };
    localStorage.setItem('veille_local', JSON.stringify(local));
  } catch(e) {}
  try {
    const { error } = await sb.from('article_state').upsert({
      hash, status, early_brief, note: note || '', updated_at: new Date().toISOString()
    }, { onConflict: 'hash' });
    if (error) console.warn('Supabase write failed:', error.message);
  } catch(e) {
    console.warn('Supabase upsert error:', e.message);
  }
}

// --- Fetch data.json (static file, no API) ---
async function fetchData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('data.json not found');
    const raw = await res.json();

    const local = await loadLocalState();

    state.sources = raw.sources || [];
    state.items = (raw.items || []).map((item, i) => {
      const localItem = local[item.hash] || {};
      return {
        id: i,
        hash: item.hash,
        title: item.title || 'Sans titre',
        url: item.url || '',
        summary: item.summary || '',
        author: item.author || '',
        published: item.published || '',
        source: item.source_name || '',
        source_type: item.source_type || '',
        category: item.category || '',
        score: item.score || 0,
        score_breakdown: item.score_breakdown || '',
        doc_type: item.doc_type || null,
        action_class: item.action_class || 'info',
        is_primary: item.is_primary || false,
        status: localItem.status || item.status || (item.score >= 40 ? 'important' : 'new'),
        early_brief: localItem.early_brief !== undefined ? localItem.early_brief : (item.early_brief || false),
        note: localItem.note || '',
        ai_summary: item.ai_summary || null,
      };
    });

    const lastUpdate = raw.last_update ? new Date(raw.last_update) : null;
    if (lastUpdate) {
      document.getElementById('last-update').textContent =
        'Dernière ingestion : ' + lastUpdate.toLocaleDateString('fr-FR') + ' à ' + lastUpdate.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    } else {
      document.getElementById('last-update').textContent = 'Données chargées';
    }

  } catch (e) {
    console.error('Fetch error:', e);
    document.getElementById('feed-cards').innerHTML =
      '<div class="empty">Impossible de charger data.json. L\'ingestion n\'a peut-être pas encore tourné.</div>';
    return;
  }

  renderCurrentTab();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function isFresh(iso) {
  if (!iso) return false;
  return (Date.now() - new Date(iso).getTime()) < 86400000;
}

function relDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'à l\'instant';
  if (diff < 3600) return Math.floor(diff / 60) + ' min';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  if (diff < 604800) return Math.floor(diff / 86400) + 'j';
  return d.toLocaleDateString('fr-FR');
}

function scoreClass(s) {
  if (s >= 60) return 'score-critical';
  if (s >= 40) return 'score-high';
  if (s >= 20) return 'score-med';
  return 'score-low';
}

function statusLabel(s) {
  const m = { new:'nouveau', important:'important', reviewed:'relu', draft:'à publier', archived:'archivé' };
  return m[s] || s;
}

function catLabel(cat) {
  const m = { 'autorite_fr':'FR', 'autorite_eu':'EU', 'autorite_intl':'Intl', 'presse':'Presse', 'email':'Email' };
  return m[cat] || cat;
}

function sourceColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  const hue = Math.abs(h % 360);
  return `hsl(${hue}, 35%, 32%)`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'}); } catch(e) { return iso; }
}

function renderCard(item, full) {
  const fresh = isFresh(item.published);
  const title = item.url
    ? `<a href="${esc(item.url)}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">${esc(item.title)}</a>`
    : esc(item.title);

  let footer = '';
  if (item.doc_type) {
    footer += `<span class="chip">${esc(item.doc_type)}</span>`;
  }

  if (fresh) {
    footer += `<span class="chip new">Nouveau</span>`;
  } else {
    if (item.status === 'new') footer += `<span class="chip new">Nouveau</span>`;
    if (item.status === 'important') footer += `<span class="chip important">Important</span>`;
    if (item.status === 'reviewed') footer += `<span class="chip reviewed">Relu</span>`;
    if (item.status === 'draft') footer += `<span class="chip draft">À publier</span>`;
  }

  if (item.action_class === 'action') {
    footer += `<span class="chip action-required">Action requise</span>`;
  }

  const isSocial = item.source_type === 'social';
  if (isSocial) {
    footer += `<span class="chip social-signal">Signal</span>`;
  }

  if (item.early_brief) {
    footer += `<span class="early-brief-marker">Early Brief</span>`;
  }

  let cardClass = 'card';
  if (isSocial) cardClass += ' social-source';
  else if (item.status === 'important' && !fresh) cardClass += ' important';

  return `
    <article class="${cardClass}" data-id="${item.id}" onclick="toggleDetail(${item.id}, event)">
      <div class="card-meta">
        <span class="tag">${esc(item.source)}</span>
        <span class="meta-sep">·</span>
        <span class="tag">${relDate(item.published)}</span>
        <span class="meta-sep">·</span>
        <span class="score-badge${item.score >= 60 ? ' high' : ''}">${item.score}</span>
      </div>
      <div class="card-title">${title}</div>
      ${item.summary ? `<div class="card-summary">${esc(item.summary)}</div>` : ''}
      <div class="card-footer">
        ${footer}
      </div>

      <div class="card-detail">
        <div class="detail-grid">
          <div class="detail-field"><label>Date de publication</label><span>${fmtDate(item.published)}</span></div>
          <div class="detail-field"><label>Source</label><span>${esc(item.source)} (${catLabel(item.category)})</span></div>
          <div class="detail-field"><label>Score</label><span>${item.score}/100 — ${esc(item.score_breakdown || '')}</span></div>
          <div class="detail-field"><label>Type / Action</label><span>${item.doc_type || '—'} · ${item.action_class === 'action' ? 'Action requise' : 'Informatif'}</span></div>
          ${item.author ? `<div class="detail-field"><label>Auteur</label><span>${esc(item.author)}</span></div>` : ''}
        </div>
        <div class="note-row" onclick="event.stopPropagation()">
          <input class="note-input" id="note-${item.id}" type="text" placeholder="Ajouter une note..." value="${esc(item.note)}" onkeydown="if(event.key==='Enter'){saveNote(${item.id});}" />
          <button class="detail-btn" onclick="saveNote(${item.id})">Sauver</button>
        </div>
        <div class="detail-actions">
          ${item.url ? `<a href="${esc(item.url)}" target="_blank" rel="noreferrer" class="detail-btn" onclick="event.stopPropagation()">Ouvrir</a>` : ''}
          <button class="detail-btn" onclick="event.stopPropagation(); toggleBrief(${item.id})">${item.early_brief ? 'Retirer d\'Early Brief' : 'Ajouter à Early Brief'}</button>
          <button class="detail-btn" onclick="event.stopPropagation(); cycleStatus(${item.id})">Changer le statut</button>
        </div>
      </div>
    </article>
  `;
}

function getFilteredItems() {
  let items = [...state.items];
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cat = document.getElementById('filter-category').value;
  const status = document.getElementById('filter-status').value;
  const minScore = parseInt(document.getElementById('filter-score').value) || 0;
  const docType = document.getElementById('filter-doctype').value;
  const actionFilter = document.getElementById('filter-action').value;
  const sourceFilter = document.getElementById('filter-source').value;
  const dateFrom = document.getElementById('filter-date-from').value;
  const dateTo = document.getElementById('filter-date-to').value;
  const sortBy = document.getElementById('sort-by').value;

  if (q) items = items.filter(i => i.title.toLowerCase().includes(q) || (i.summary||'').toLowerCase().includes(q));
  if (cat) items = items.filter(i => i.category === cat);
  if (status) items = items.filter(i => i.status === status);
  if (sourceFilter) items = items.filter(i => i.source === sourceFilter);
  if (minScore) items = items.filter(i => i.score >= minScore);
  if (dateFrom) items = items.filter(i => i.published && i.published.slice(0,10) >= dateFrom);
  if (dateTo) items = items.filter(i => i.published && i.published.slice(0,10) <= dateTo);
  if (docType) items = items.filter(i => i.doc_type === docType);
  if (actionFilter) items = items.filter(i => i.action_class === actionFilter);

  if (sortBy === 'fresh') {
    items.sort((a, b) => {
      const aFresh = isFresh(a.published) ? 1 : 0;
      const bFresh = isFresh(b.published) ? 1 : 0;
      if (bFresh !== aFresh) return bFresh - aFresh;
      if (aFresh && bFresh) return (b.published||'').localeCompare(a.published||'');
      return b.score - a.score;
    });
  } else if (sortBy === 'date') {
    items.sort((a, b) => (b.published||'').localeCompare(a.published||''));
  } else {
    items.sort((a, b) => b.score - a.score || (b.published||'').localeCompare(a.published||''));
  }
  return items;
}

function renderFeed() {
  const items = getFilteredItems();
  const el = document.getElementById('feed-cards');
  if (!items.length) {
    el.innerHTML = '<div class="empty">Aucun article ne correspond aux filtres.</div>';
    return;
  }
  el.innerHTML = items.map(i => renderCard(i, false)).join('');
}

function renderBrief() {
  const items = state.items.filter(i => i.early_brief).sort((a, b) => b.score - a.score);
  const el = document.getElementById('draft-items');
  const countEl = document.getElementById('draft-count');
  countEl.textContent = items.length + ' article' + (items.length !== 1 ? 's sélectionné' : ' sélectionné') + 's';
  if (!items.length) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = items.map(i => `
    <div class="draft-item">
      <div class="draft-item-title">${esc(i.title)}</div>
      <div class="draft-item-source">${esc(i.source)}</div>
    </div>
  `).join('');
}

function renderSidebar() {
  const counts = {
    tous: state.items.length,
    fresh: state.items.filter(i => isFresh(i.published)).length,
    primary: state.items.filter(i => i.is_primary).length,
    status_new: state.items.filter(i => i.status === 'new').length,
    status_important: state.items.filter(i => i.status === 'important').length,
    status_reviewed: state.items.filter(i => i.status === 'reviewed').length,
    status_draft: state.items.filter(i => i.status === 'draft').length,
    status_archived: state.items.filter(i => i.status === 'archived').length,
  };

  document.getElementById('count-tous').textContent = counts.tous;
  document.getElementById('count-fresh').textContent = counts.fresh;
  document.getElementById('count-primary').textContent = counts.primary;
  document.getElementById('count-status-new').textContent = counts.status_new;
  document.getElementById('count-status-important').textContent = counts.status_important;
  document.getElementById('count-status-reviewed').textContent = counts.status_reviewed;
  document.getElementById('count-status-draft').textContent = counts.status_draft;
  document.getElementById('count-status-archived').textContent = counts.status_archived;

  const sourcesList = document.getElementById('sources-list');
  const sourceCounts = {};
  state.items.forEach(i => { sourceCounts[i.source] = (sourceCounts[i.source] || 0) + 1; });

  const catGroups = { 'autorite_fr': 'Autorités FR', 'autorite_eu': 'Autorités EU', 'autorite_intl': 'International', 'presse': 'Presse', 'social': 'Réseaux sociaux', 'email': 'Email' };
  const grouped = {};
  state.sources.forEach(s => {
    const cat = s.category || s.source_type || 'presse';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(s);
  });

  let html = '';
  for (const [cat, label] of Object.entries(catGroups)) {
    const sources = grouped[cat];
    if (!sources || sources.length === 0) continue;
    html += `<div><div class="source-group-label">${label}</div><div class="source-group-items">`;
    html += sources.map(s => {
      const count = sourceCounts[s.name] || 0;
      const isActive = state.sourceFilter === s.name;
      return `<button class="source-pill${isActive ? ' active' : ''}" data-filter="source" data-value="${esc(s.name)}">${esc(s.name)}<span class="source-count">${count}</span></button>`;
    }).join('');
    html += `</div></div>`;
  }
  sourcesList.innerHTML = html;
}

function updateStats() {
  const fresh = state.items.filter(i => isFresh(i.published)).length;
  const important = state.items.filter(i => i.status === 'draft').length;
  document.getElementById('stat-total').textContent = state.items.length;
  document.getElementById('stat-fresh').textContent = fresh;
  document.getElementById('stat-important').textContent = important;
}

function renderCurrentTab() {
  renderFeed();
  renderBrief();
  renderSidebar();
  updateStats();
}

// Actions — Supabase + localStorage fallback
window.toggleBrief = function(id) {
  const item = state.items.find(i => i.id === id);
  if (item) {
    item.early_brief = !item.early_brief;
    saveItemState(item.hash, item.status, item.early_brief, item.note);
    showToast(item.early_brief ? '★ Ajouté à Early Brief' : 'Retiré d\'Early Brief');
    renderCurrentTab();
  }
};

window.cycleStatus = function(id) {
  const order = ['new', 'important', 'reviewed', 'draft', 'archived'];
  const labels = { new: 'Nouveau', important: 'Important', reviewed: 'Relu', draft: 'À publier', archived: 'Archivé' };
  const item = state.items.find(i => i.id === id);
  if (item) {
    const idx = order.indexOf(item.status);
    item.status = order[(idx + 1) % order.length];
    saveItemState(item.hash, item.status, item.early_brief, item.note);
    showToast('Statut : ' + (labels[item.status] || item.status));
    renderCurrentTab();
  }
};

window.saveNote = function(id) {
  const item = state.items.find(i => i.id === id);
  const input = document.getElementById('note-' + id);
  if (item && input) {
    item.note = input.value.trim();
    saveItemState(item.hash, item.status, item.early_brief, item.note);
    showToast('Note enregistrée');
  }
};

window.exportBrief = function() {
  const items = state.items.filter(i => i.early_brief).sort((a, b) => b.score - a.score);
  if (!items.length) { showToast('Aucun article dans Early Brief'); return; }

  const today = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  let md = `# Early Brief — ${today}\n\n`;

  items.forEach((item, idx) => {
    md += `## ${idx + 1}. ${item.title}\n\n`;
    if (item.note) md += `**Angle :** ${item.note}\n\n`;
    if (item.summary) md += `${item.summary}\n\n`;
    md += `**Source :** ${item.source} (${catLabel(item.category)})`;
    if (item.published) md += ` — ${fmtDate(item.published)}`;
    md += `\n`;
    if (item.url) md += `**Lien :** ${item.url}\n`;
    if (item.doc_type) md += `**Type :** ${item.doc_type}\n`;
    md += `\n---\n\n`;
  });

  const textarea = document.getElementById('brief-export');
  textarea.style.display = 'block';
  textarea.value = md;
  textarea.select();
  try { navigator.clipboard.writeText(md); showToast('Draft copié dans le presse-papier'); }
  catch(e) { showToast('Draft généré — sélectionnez et copiez'); }
};

// Sidebar filter handlers
document.querySelectorAll('.sidebar-item[data-filter]').forEach(item => {
  item.addEventListener('click', () => {
    const section = item.parentElement;
    section.querySelectorAll('.sidebar-item[data-filter]').forEach(i => i.classList.remove('active'));
    item.classList.add('active');

    const filterType = item.dataset.filter;
    const filterValue = item.dataset.value;

    if (filterType === 'fil') {
      if (filterValue === '') {
        document.getElementById('filter-category').value = '';
        document.getElementById('filter-status').value = '';
        document.getElementById('filter-score').value = '0';
      } else if (filterValue === 'fresh') {
        document.getElementById('filter-date-from').value = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        document.getElementById('filter-date-to').value = '';
      }
    } else if (filterType === 'status') {
      document.getElementById('filter-status').value = filterValue;
    }

    renderFeed();
  });
});

// Source pill click delegation (dynamic elements)
document.getElementById('sources-list').addEventListener('click', (e) => {
  const pill = e.target.closest('.source-pill');
  if (!pill) return;
  const value = pill.dataset.value;
  // Toggle: if already active, deselect
  if (state.sourceFilter === value) {
    state.sourceFilter = '';
    document.getElementById('filter-source').value = '';
  } else {
    state.sourceFilter = value;
    document.getElementById('filter-source').value = value;
  }
  renderCurrentTab();
});

// Search and filter listeners
let debounce;
['search','filter-date-from','filter-date-to'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(renderFeed, 150); });
  el.addEventListener('change', () => { clearTimeout(debounce); debounce = setTimeout(renderFeed, 150); });
});

// Sort button handlers
document.querySelectorAll('.sort-button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sort-by').value = btn.dataset.sort;
    renderFeed();
  });
});

// Detail panel toggle
window.toggleDetail = function(id, event) {
  if (event && (event.target.tagName === 'A' || event.target.tagName === 'BUTTON' || event.target.closest('.detail-btn') || event.target.closest('.chip'))) return;
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) card.classList.toggle('expanded');
};

// Advanced filters toggle
window.toggleAdvancedFilters = function() {
  const filters = document.getElementById('advanced-filters');
  filters.classList.toggle('open');
  document.getElementById('toggle-arrow').textContent = filters.classList.contains('open') ? '▴' : '▾';
};

// Init
fetchData();
</script>
