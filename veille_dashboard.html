<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veille Réglementaire</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --surface: #fffaf0;
      --card: #ffffff;
      --border: #d6c7ad;
      --text: #1f1a14;
      --muted: #6f6558;
      --accent: #9f3d24;
      --accent2: #1e5b52;
      --success: #2d8176;
      --warn: #a36a00;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Georgia", serif;
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(159,61,36,0.07), transparent 24rem),
                  radial-gradient(circle at bottom right, rgba(30,91,82,0.07), transparent 24rem),
                  var(--bg);
      line-height: 1.55;
    }
    a { color: var(--accent2); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    .header {
      background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(255,250,240,0.96));
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(31,26,20,0.08);
    }
    .header-inner {
      max-width: 1300px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }
    .header h1 { font-size: 1.5rem; letter-spacing: -0.02em; }
    .header .meta { color: var(--muted); font-size: 0.88rem; }
    .stats-row {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 6px 14px; font-size: 0.88rem; display: flex; align-items: center; gap: 6px;
    }
    .stat-chip strong { font-size: 1.1rem; }

    /* Tabs */
    .tabs {
      max-width: 1300px; margin: 0 auto; padding: 16px 24px 0;
      display: flex; gap: 4px;
    }
    .tab {
      padding: 10px 20px; border-radius: 10px 10px 0 0;
      background: transparent; border: none; cursor: pointer;
      font: inherit; font-size: 0.95rem; color: var(--muted);
      transition: all 150ms ease;
    }
    .tab:hover { background: rgba(159,61,36,0.06); }
    .tab.active {
      background: var(--card); color: var(--text); font-weight: 600;
      box-shadow: 0 -2px 8px rgba(31,26,20,0.06);
    }
    .tab .badge {
      background: var(--accent); color: #fff; border-radius: 10px;
      padding: 1px 8px; font-size: 0.78rem; margin-left: 6px;
    }

    /* Content */
    .content {
      max-width: 1300px; margin: 0 auto; padding: 0 24px 48px;
    }
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      padding: 24px; min-height: 400px;
      box-shadow: 0 4px 16px rgba(31,26,20,0.06);
    }

    /* Search & Filters */
    .toolbar {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
      align-items: center;
    }
    .search-box {
      flex: 1; min-width: 260px; position: relative;
    }
    .search-box input {
      width: 100%; padding: 10px 14px 10px 38px;
      border: 1px solid var(--border); border-radius: 10px;
      font: inherit; font-size: 0.95rem; background: var(--surface);
      transition: border-color 150ms;
    }
    .search-box input:focus { outline: none; border-color: var(--accent2); }
    .search-box::before {
      content: "🔍"; position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 0.9rem;
    }
    select {
      padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 10px; font: inherit; font-size: 0.9rem;
      background: var(--surface); cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--accent2); }

    /* Cards */
    .cards { display: grid; gap: 14px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      transition: box-shadow 150ms, transform 150ms;
      display: grid; grid-template-columns: 1fr auto; gap: 12px;
    }
    .card:hover {
      box-shadow: 0 6px 20px rgba(31,26,20,0.1);
      transform: translateY(-1px);
    }
    .card-body { min-width: 0; }
    .card-title {
      font-size: 1.05rem; font-weight: 600; margin-bottom: 6px;
      line-height: 1.35;
    }
    .card-title a { color: var(--text); }
    .card-title a:hover { color: var(--accent2); text-decoration: none; }
    .card-meta {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .pill {
      display: inline-flex; align-items: center; padding: 3px 10px;
      border-radius: 20px; font-size: 0.78rem; font-weight: 500;
    }
    .pill-source { color: #fff; }
    .pill-category {
      background: #efe4d2; color: var(--text);
    }
    .pill-status { cursor: pointer; user-select: none; }
    .pill-status.new { background: #dcefe8; color: #1e5b52; }
    .pill-status.important { background: #f6dfd0; color: #8a3119; }
    .pill-status.reviewed { background: #dde4f0; color: #2c3e80; }
    .pill-status.archived { background: #e8e4de; color: #6f6558; }
    .card-summary {
      color: var(--muted); font-size: 0.9rem; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-date { color: var(--muted); font-size: 0.82rem; margin-top: 6px; }
    .card-actions {
      display: flex; flex-direction: column; gap: 8px;
      align-items: center; justify-content: flex-start;
    }
    .score-badge {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: #fff;
    }
    .score-low { background: #90a4ae; }
    .score-med { background: #f9a825; }
    .score-high { background: #e65100; }
    .score-critical { background: #b71c1c; }
    .btn-star {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 150ms;
    }
    .btn-star:hover { background: #fff8e1; border-color: #f9a825; }
    .btn-star.active { background: #fff8e1; border-color: #f9a825; }

    /* Sources tab */
    .sources-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .source-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .source-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .source-card h3 { font-size: 0.95rem; margin-bottom: 2px; }
    .source-card .meta { color: var(--muted); font-size: 0.82rem; }
    .source-card .count { margin-left: auto; font-weight: 700; font-size: 1.1rem; color: var(--accent); }

    /* Empty state */
    .empty {
      text-align: center; padding: 48px 24px; color: var(--muted);
    }
    .empty p { font-size: 1.05rem; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      background: #333; color: #fff; padding: 12px 20px;
      border-radius: 10px; font-size: 0.9rem; opacity: 0;
      transform: translateY(10px);
      transition: all 300ms ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Responsive */
    @media (max-width: 768px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      .card { grid-template-columns: 1fr; }
      .card-actions { flex-direction: row; justify-content: flex-start; }
      .tabs { overflow-x: auto; }
      .toolbar { flex-direction: column; }
      .search-box { min-width: 100%; }
    }
  </style>
</head>

<header class="header">
  <div class="header-inner">

      <h1>Veille Réglementaire</h1>
      <div class="meta">Dernière mise à jour : 26/03/2026 à 08:34</div>
    </div>

  <div class="panel" id="panel-sources" style="display:none;">

</main>

// State (in-memory, persists via data attributes in DOM for starred items)
const state = {
  items: RAW_ITEMS.map((item, i) => ({
    ...item,
    id: i,
    status: item.score >= 40 ? 'important' : 'new',
    early_brief: false,
  })),
  activeTab: 'feed',
};

// Try to restore early_brief state from a previous session
try {
  const saved = JSON.parse(localStorage.getItem('veille_brief') || '{}');
  state.items.forEach(item => {
    if (saved[item.hash]) item.early_brief = true;
  });
} catch(e) {}

function saveBriefState() {
  const brief = {};
  state.items.filter(i => i.early_brief).forEach(i => { brief[i.hash] = true; });
  try { localStorage.setItem('veille_brief', JSON.stringify(brief)); } catch(e) {}
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relativeDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 3600) return Math.max(1, Math.floor(diff / 60)) + ' min';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  if (diff < 604800) return Math.floor(diff / 86400) + 'j';
  return d.toLocaleDateString('fr-FR');
}

function scoreClass(s) {
  if (s >= 60) return 'score-critical';
  if (s >= 40) return 'score-high';
  if (s >= 20) return 'score-med';
  return 'score-low';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function renderCard(item, showFullSummary) {
  const starClass = item.early_brief ? 'btn-star active' : 'btn-star';
  const statusClass = `pill pill-status ${item.status}`;
  const summaryStyle = showFullSummary ? '' : 'display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;';
  const title = item.url
    ? `<a href="${escHtml(item.url)}" target="_blank" rel="noreferrer">${escHtml(item.title)}</a>`
    : escHtml(item.title);

  return `
    <article class="card" data-id="${item.id}">
      <div class="card-body">
        <div class="card-title">${title}</div>
        <div class="card-meta">
          <span class="pill pill-source" style="background:${item.color}">${escHtml(item.source)}</span>
          <span class="pill pill-category">${categoryLabel(item.category)}</span>
          <span class="${statusClass}" onclick="cycleStatus(${item.id})">${escHtml(item.status)}</span>
        </div>
        <div class="card-summary" style="${summaryStyle}">${escHtml(item.summary)}</div>
        <div class="card-date">${relativeDate(item.published)}</div>
      </div>
      <div class="card-actions">
        <div class="score-badge ${scoreClass(item.score)}">${item.score}</div>
        <button class="${starClass}" onclick="toggleBrief(${item.id})" title="Early Brief">⭐</button>
      </div>
    </article>
  `;
}

function categoryLabel(cat) {
  const labels = {
    'autorité_fr': '🇫🇷 FR',
    'autorité_eu': '🇪🇺 EU',
    'autorité_intl': '🌍 Intl',
    'officiel_fr': '📜 JORF',
    'presse': '📰 Presse',
  };
  return labels[cat] || cat;
}

function getFilteredItems() {
  let items = [...state.items];
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cat = document.getElementById('filter-category').value;
  const status = document.getElementById('filter-status').value;
  const minScore = parseInt(document.getElementById('filter-score').value) || 0;
  const sortBy = document.getElementById('sort-by').value;

  if (q) items = items.filter(i => i.title.toLowerCase().includes(q) || (i.summary || '').toLowerCase().includes(q));
  if (cat) items = items.filter(i => i.category === cat);
  if (status) items = items.filter(i => i.status === status);
  if (minScore) items = items.filter(i => i.score >= minScore);

  if (sortBy === 'date') {
    items.sort((a, b) => (b.published || '').localeCompare(a.published || ''));
  } else {
    items.sort((a, b) => b.score - a.score || (b.published || '').localeCompare(a.published || ''));
  }

  return items;
}

function renderFeed() {
  const items = getFilteredItems();
  const container = document.getElementById('feed-cards');
  if (!items.length) {
    container.innerHTML = '<div class="empty"><p>Aucun article ne correspond aux filtres.</p></div>';
    return;
  }
  container.innerHTML = items.map(i => renderCard(i, false)).join('');
}

function renderBrief() {
  const items = state.items.filter(i => i.early_brief).sort((a, b) => b.score - a.score);
  const container = document.getElementById('brief-cards');
  document.getElementById('brief-badge').textContent = items.length;
  document.getElementById('stat-brief').textContent = items.length;

  if (!items.length) {
    container.innerHTML = '<div class="empty"><p>Aucun article marqué pour Early Brief. Cliquez ⭐ sur un article pour le sélectionner.</p></div>';
    return;
  }
  container.innerHTML = items.map(i => renderCard(i, true)).join('');
}

function renderSources() {
  const grid = document.getElementById('sources-grid');
  const countBySource = {};
  state.items.forEach(i => { countBySource[i.source] = (countBySource[i.source] || 0) + 1; });

  grid.innerHTML = SOURCES_CONFIG.map(s => `
    <div class="source-card">
      <div class="source-dot" style="background:${s.color}"></div>
      <div>
        <h3>${escHtml(s.name)}</h3>
        <div class="meta">${categoryLabel(s.category)}</div>
      </div>
      <div class="count">${countBySource[s.name] || 0}</div>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('stat-total').textContent = state.items.length;
  document.getElementById('stat-important').textContent = state.items.filter(i => i.score >= 40).length;
  document.getElementById('stat-brief').textContent = state.items.filter(i => i.early_brief).length;
  document.getElementById('stat-sources').textContent = SOURCES_CONFIG.length;
  document.getElementById('brief-badge').textContent = state.items.filter(i => i.early_brief).length;
}

function renderCurrentTab() {
  document.getElementById('panel-feed').style.display = state.activeTab === 'feed' ? '' : 'none';
  document.getElementById('panel-brief').style.display = state.activeTab === 'brief' ? '' : 'none';
  document.getElementById('panel-sources').style.display = state.activeTab === 'sources' ? '' : 'none';

  if (state.activeTab === 'feed') renderFeed();
  if (state.activeTab === 'brief') renderBrief();
  if (state.activeTab === 'sources') renderSources();
  updateStats();
}

// Actions
window.toggleBrief = function(id) {
  const item = state.items.find(i => i.id === id);
  if (item) {
    item.early_brief = !item.early_brief;
    saveBriefState();
    showToast(item.early_brief ? '⭐ Ajouté à Early Brief' : 'Retiré d\'Early Brief');
    renderCurrentTab();
  }
};

window.cycleStatus = function(id) {
  const order = ['new', 'important', 'reviewed', 'archived'];
  const item = state.items.find(i => i.id === id);
  if (item) {
    const idx = order.indexOf(item.status);
    item.status = order[(idx + 1) % order.length];
    showToast('Statut : ' + item.status);
    renderCurrentTab();
  }
};

// Tab navigation
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.activeTab = tab.dataset.tab;
    renderCurrentTab();
  });
});

// Search & filters with debounce
let debounce;
['search', 'filter-category', 'filter-status', 'filter-score', 'sort-by'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(renderFeed, 200);
  });
  document.getElementById(id).addEventListener('change', () => {
    clearTimeout(debounce);
    debounce = setTimeout(renderFeed, 200);
  });
});

// Init
renderCurrentTab();
</script>
